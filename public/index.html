<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"><title>XMZ MCMOD</title><link rel="icon" href="/logo.png"><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><style>body{background:#0b0c10}.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08)}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:99px}</style></head><body class="text-gray-100 font-sans min-h-screen"><header class="sticky top-0 z-30 glass px-4 py-3 flex items-center gap-3"><img src="/logo.png" class="w-8 h-8 rounded-lg object-cover"><span class="font-bold text-lg">XMZ MCMOD</span><div class="flex-1 flex items-center gap-2 bg-white/5 rounded-full px-4 h-10 max-w-md ml-4"><i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i><input id="q" type="text" placeholder="Cari mod, plugin, resource pack..." class="flex-1 bg-transparent outline-none text-sm placeholder:text-gray-500"></div><div class="hidden md:flex items-center gap-1 ml-auto" id="typeTabs"></div></header><main class="max-w-6xl mx-auto px-4 py-6"><div class="flex md:hidden gap-1 overflow-x-auto pb-4" id="typeTabsMobile"></div><div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div><div id="loadMoreWrap" class="flex justify-center mt-8"><button id="loadMore" class="glass px-6 py-2.5 rounded-full text-sm font-semibold hover:bg-white/10 transition">Muat lebih banyak</button></div><p class="text-center text-xs text-gray-500 mt-10">Sumber: Modrinth &bull; Developer: Xemzz</p></main><div id="modal" class="fixed inset-0 z-50 hidden"><div class="absolute inset-0 bg-black/70" id="modalOverlay"></div><div class="absolute inset-x-0 bottom-0 md:inset-0 md:flex md:items-center md:justify-center"><div class="glass w-full md:max-w-2xl md:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto p-5" id="modalBody"></div></div></div><script>const TYPES=[["mod","Mods"],["modpack","Modpacks"],["resourcepack","Resource Packs"],["shader","Shaders"],["plugin","Plugins"],["datapack","Datapacks"]];let state={type:"mod",q:"",offset:0,limit:24,total:0};function renderTabs(){ const html=TYPES.map(([v,l])=>`<button data-type="${v}" class="tab px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition ${v===state.type?"bg-emerald-500 text-black":"bg-white/5 text-gray-300 hover:bg-white/10"}">${l}</button>`).join(""); document.getElementById("typeTabs").innerHTML=html; document.getElementById("typeTabsMobile").innerHTML=html; document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>{state.type=b.dataset.type;state.offset=0;search(true)}));}function fmtNum(n){ if(n>=1000000)return(n/1000000).toFixed(1)+"M"; if(n>=1000)return(n/1000).toFixed(1)+"K"; return n;}function card(hit){ return `<article data-id="${hit.project_id||hit.slug}" class="proj-card glass rounded-xl overflow-hidden cursor-pointer hover:shadow-lg hover:shadow-emerald-500/10 transition group"><div class="aspect-square bg-white/5 overflow-hidden"><img src="${hit.icon_url||''}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" onerror="this.style.display='none'"></div><div class="p-3"><h3 class="font-bold text-sm line-clamp-1">${hit.title}</h3><p class="text-xs text-gray-400 line-clamp-2 mt-1 h-8">${hit.description||''}</p><div class="flex items-center gap-3 mt-2 text-[11px] text-gray-500"><span><i class="fa-solid fa-download mr-1"></i>${fmtNum(hit.downloads||0)}</span><span><i class="fa-solid fa-heart mr-1"></i>${fmtNum(hit.follows||0)}</span></div></div></article>`;}async function search(reset){ if(reset){document.getElementById("grid").innerHTML="";state.offset=0} const url=`/api/search?q=${encodeURIComponent(state.q)}&type=${state.type}&offset=${state.offset}&limit=${state.limit}`; const r=await fetch(url); const data=await r.json(); state.total=data.total_hits||0; const grid=document.getElementById("grid"); grid.insertAdjacentHTML("beforeend",(data.hits||[]).map(card).join("")); document.querySelectorAll(".proj-card").forEach(el=>el.onclick=()=>openProject(el.dataset.id)); state.offset+=state.limit; document.getElementById("loadMoreWrap").style.display=state.offset<state.total?"flex":"none";}async function openProject(id){ const modal=document.getElementById("modal"); const body=document.getElementById("modalBody"); modal.classList.remove("hidden"); body.innerHTML=`<div class="flex justify-center py-10"><i class="fa-solid fa-spinner fa-spin text-2xl text-emerald-400"></i></div>`; const r=await fetch(`/api/project?id=${encodeURIComponent(id)}`); const data=await r.json(); const p=data.project; const versions=(data.versions||[]).slice(0,15); body.innerHTML=`<div class="flex items-start gap-4"><img src="${p.icon_url||''}" class="w-16 h-16 rounded-xl object-cover bg-white/5"><div class="flex-1"><h2 class="font-bold text-lg">${p.title}</h2><p class="text-sm text-gray-400 mt-1">${p.description||''}</p><div class="flex items-center gap-3 mt-2 text-xs text-gray-500"><span><i class="fa-solid fa-download mr-1"></i>${fmtNum(p.downloads||0)}</span><span><i class="fa-solid fa-scale-balanced mr-1"></i>${p.license?.id||'unknown'}</span></div></div><button onclick="closeModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button></div><div class="mt-5"><h3 class="text-sm font-bold mb-2 text-gray-300">Versi</h3><div class="flex flex-col gap-2">${versions.map(v=>{ const file=(v.files||[]).find(f=>f.primary)||v.files?.[0]; if(!file)return""; return `<div class="flex items-center justify-between bg-white/5 rounded-lg px-3 py-2.5"><div class="min-w-0"><p class="text-sm font-semibold truncate">${v.name||v.version_number}</p><p class="text-xs text-gray-500">${(v.game_versions||[]).slice(0,3).join(", ")} &bull; ${v.loaders?.join(", ")||''}</p></div><a href="/api/download?url=${encodeURIComponent(file.url)}&name=${encodeURIComponent(file.filename)}" class="shrink-0 ml-3 bg-emerald-500 hover:bg-emerald-400 text-black text-xs font-bold px-3 py-2 rounded-full transition"><i class="fa-solid fa-download mr-1"></i>${((file.size||0)/1048576).toFixed(1)}MB</a></div>`;}).join("")}</div></div>`;}function closeModal(){document.getElementById("modal").classList.add("hidden")}document.getElementById("modalOverlay").onclick=closeModal;let debounce;document.getElementById("q").addEventListener("input",e=>{ state.q=e.target.value; clearTimeout(debounce); debounce=setTimeout(()=>search(true),400);});document.getElementById("loadMore").addEventListener("click",()=>search(false));renderTabs();search(true);</script></body></html>
